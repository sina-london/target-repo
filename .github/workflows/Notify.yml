name: Notify Release

on:
  workflow_run:
    workflows: ["Release Build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      notify_everyone:
        type: boolean
        default: true
      include_logs:
        type: boolean
        default: true
      is_prerelease:
        type: boolean
        default: false
      tag_name:
        type: string
        default: "latest"
      use_latest_artifacts:
        type: boolean
        default: false

  workflow_call:
    inputs:
      notify_everyone:
        type: boolean
        default: true
      include_logs:
        type: boolean
        default: true
      is_prerelease:
        type: boolean
        default: false
      tag_name:
        type: string
        default: "latest"
      use_latest_artifacts:
        type: boolean
        default: false
    secrets:
      DISCORD_WEBHOOK:
        required: true

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      # This step fixes the "not a git repository" crash
      - uses: actions/checkout@v4

      - name: Set up Environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "NOTIFY_EVERYONE=true" >> $GITHUB_ENV
            echo "INCLUDE_LOGS=true" >> $GITHUB_ENV
            
            if [[ "${{ github.event.workflow_run.head_branch }}" == *"-"* ]]; then
              echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            else
              echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            fi
            
            echo "TAG_NAME=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_ENV
            echo "TARGET_RUN_ID=${{ github.event.workflow_run.id }}" >> $GITHUB_ENV
          else
            echo "NOTIFY_EVERYONE=${{ inputs.notify_everyone }}" >> $GITHUB_ENV
            echo "INCLUDE_LOGS=${{ inputs.include_logs }}" >> $GITHUB_ENV
            echo "IS_PRERELEASE=${{ inputs.is_prerelease }}" >> $GITHUB_ENV
            echo "TAG_NAME=${{ inputs.tag_name }}" >> $GITHUB_ENV
            
            if [ "${{ inputs.use_latest_artifacts }}" = "true" ]; then
              export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
              RUN_ID=$(gh run list --workflow "Release Build" --status success --limit 1 --json databaseId -q ".[0].databaseId")
              echo "TARGET_RUN_ID=${RUN_ID:-${{ github.run_id }}}" >> $GITHUB_ENV
            else
              echo "TARGET_RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV
            fi
          fi

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          run-id: ${{ env.TARGET_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: all-artifacts
          merge-multiple: true

      - name: Fetch Data
        id: fetch_data
        run: |
          set -euo pipefail
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          
          if [ "$TAG_NAME" = "main" ] || [ "$TAG_NAME" = "commit" ]; then
            COMMIT_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/commits/$GITHUB_REF_NAME")
            TAG=$(echo "$COMMIT_DATA" | jq -r '.sha[0:7]')
            URL=$(echo "$COMMIT_DATA" | jq -r '.html_url')
            echo "$COMMIT_DATA" | jq -r '.commit.message' > release_notes.txt
            echo "[]" > assets.json
            echo "is_commit=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "url=$URL" >> $GITHUB_OUTPUT
          else
            TARGET_ARGS=""
            if [ "$TAG_NAME" != "latest" ] && [ -n "$TAG_NAME" ]; then
              TARGET_ARGS="$TAG_NAME"
            fi
            
            if gh release view $TARGET_ARGS --json tagName,url,body,assets > release.json 2>/dev/null; then
              TAG=$(jq -r '.tagName' release.json)
              URL=$(jq -r '.url' release.json)
              jq -r '.body' release.json > release_notes.txt
              jq -c '.assets' release.json > assets.json
              echo "is_commit=false" >> $GITHUB_OUTPUT
              echo "tag=$TAG" >> $GITHUB_OUTPUT
              echo "url=$URL" >> $GITHUB_OUTPUT
            else
              if [ "$TAG_NAME" = "latest" ]; then
                REF="${{ github.event.workflow_run.head_sha || github.sha }}"
                COMMIT_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/repos/${{ github.repository }}/commits/$REF")
                TAG=$(echo "$COMMIT_DATA" | jq -r '.sha[0:7]')
                URL=$(echo "$COMMIT_DATA" | jq -r '.html_url')
                echo "$COMMIT_DATA" | jq -r '.commit.message' > release_notes.txt
                echo "[]" > assets.json
                echo "is_commit=true" >> $GITHUB_OUTPUT
                echo "tag=$TAG" >> $GITHUB_OUTPUT
                echo "url=$URL" >> $GITHUB_OUTPUT
              else
                PRERELEASE_FLAG=""
                if [ "$IS_PRERELEASE" = "true" ]; then PRERELEASE_FLAG="--prerelease"; fi
                
                FILES=()
                if [ -d "all-artifacts" ]; then
                  while IFS= read -r -d $'\0' file; do
                    FILES+=("$file")
                  done < <(find all-artifacts -type f -print0)
                fi
                
                gh release create "$TAG_NAME" "${FILES[@]}" \
                  --title "Release $TAG_NAME" \
                  --generate-notes \
                  --target "${{ github.event.workflow_run.head_branch || github.ref_name }}" \
                  $PRERELEASE_FLAG
                  
                gh release view "$TAG_NAME" --json tagName,url,body,assets > release.json
                TAG=$(jq -r '.tagName' release.json)
                URL=$(jq -r '.url' release.json)
                jq -r '.body' release.json > release_notes.txt
                jq -c '.assets' release.json > assets.json
                echo "is_commit=false" >> $GITHUB_OUTPUT
                echo "tag=$TAG" >> $GITHUB_OUTPUT
                echo "url=$URL" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Categorize Assets
        run: |
          if [ -s assets.json ] && [ "$(cat assets.json)" != "null" ] && [ "$(cat assets.json)" != "[]" ]; then
            jq -r '.[] | "🔹 [\(.name)](\(.browser_download_url // .url)) | \((.size/1048576) | tonumber | round) MB"' assets.json > asset_list.txt
          else
            echo "No assets available." > asset_list.txt
          fi

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          MENTION: ${{ env.NOTIFY_EVERYONE == 'true' && '@everyone' || '' }}
          TAG: ${{ steps.fetch_data.outputs.tag }}
          URL: ${{ steps.fetch_data.outputs.url }}
          IS_COMMIT: ${{ steps.fetch_data.outputs.is_commit }}
          IS_PRERELEASE: ${{ env.IS_PRERELEASE }}
          INCLUDE_LOGS: ${{ env.INCLUDE_LOGS }}
          LOGS_URL: ${{ github.event.workflow_run.html_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }}
        run: |
          if [ "$IS_COMMIT" = "true" ]; then
            TITLE="🔨 New Update (Commit: $TAG)"
            COLOR=3447003 
          elif [ "$IS_PRERELEASE" = "true" ]; then
            TITLE="🛠️ New Pre-Release: $TAG"
            COLOR=16753920
          else
            TITLE="🚀 New Release: $TAG"
            COLOR=1754309
          fi

          jq -n \
            --arg mention "$MENTION" \
            --arg title "$TITLE" \
            --arg url "$URL" \
            --arg color "$COLOR" \
            --arg logs_url "$LOGS_URL" \
            --arg include_logs "$INCLUDE_LOGS" \
            --arg is_commit "$IS_COMMIT" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --rawfile notes release_notes.txt \
            --rawfile assets asset_list.txt \
            '
            (
              if $is_commit == "true" then
                "### Commit Message\n" + $notes
              else
                "### Changelog\n" + $notes + "\n\n### Downloads\n" + $assets
              end |
              if $include_logs == "true" then
                . + "\n\n### Logs\n[View Build Logs](" + $logs_url + ")"
              else
                .
              end |
              if length > 3900 then
                .[0:3900] + "... [View full changelog on GitHub](" + $url + ")"
              else
                .
              end
            ) as $desc |
            {
              content: $mention,
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: ($color | tonumber),
                timestamp: $timestamp
              }]
            }
            ' > final_payload.json
            
          curl -s -H "Content-Type: application/json" -X POST -d @final_payload.json "$DISCORD_WEBHOOK"
