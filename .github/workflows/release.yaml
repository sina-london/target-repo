name: Release Build

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      build_android:
        type: boolean
        default: true
      build_linux:
        type: boolean
        default: true
      build_windows:
        type: boolean
        default: true
      notify_discord:
        description: "Send Discord Notification?"
        type: boolean
        default: true
      notify_everyone:
        description: "Ping @everyone on Discord?"
        type: boolean
        default: true
      include_logs:
        description: "Include run logs link in notification?"
        type: boolean
        default: true
      is_prerelease:
        description: "Is this a pre-release?"
        type: boolean
        default: false
      tag_name:
        description: "Release tag ('auto', 'latest', 'main', or specific)"
        type: string
        default: "auto"

permissions:
  contents: write

jobs:
  resolve-release-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          INPUT_IS_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.is_prerelease || false }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          requested="${REQUESTED_TAG:-auto}"
          requested="$(echo "$requested" | xargs)"

          tag_exists_or_released() {
            local tag="$1"
            git rev-parse -q --verify "refs/tags/$tag" >/dev/null || gh release view "$tag" >/dev/null 2>&1
          }

          latest_alpha_for_base() {
            local prefix="$1"
            {
              git tag --list "${prefix}-alpha.*"
              gh release list --limit 200 --json tagName -q '.[].tagName' 2>/dev/null || true
            } | sed -n "s/^$(printf '%s' "$prefix" | sed 's/[.[\*^$()+?{}|\\]/\\&/g')-alpha\.\([0-9][0-9]*\)$/\1/p" | sort -n | tail -1
          }

          if [ "${{ github.event_name }}" = "push" ]; then
            resolved="$GITHUB_REF_NAME"
          elif [ -z "$requested" ] || [ "$requested" = "auto" ]; then
            version="$(awk '/^version:[[:space:]]*/ {print $2; exit}' pubspec.yaml | cut -d+ -f1)"
            if [ -z "$version" ]; then
              echo "Could not read version from pubspec.yaml" >&2
              exit 1
            fi

            base_tag="v$version"
            if tag_exists_or_released "$base_tag"; then
              major_minor="${version%.*}"
              patch="${version##*.}"
              next_patch=$((patch + 1))
              alpha_base="v${major_minor}.${next_patch}"
              last_alpha="$(latest_alpha_for_base "$alpha_base")"
              if [ -z "$last_alpha" ]; then
                resolved="${alpha_base}-alpha.1"
              else
                resolved="${alpha_base}-alpha.$((last_alpha + 1))"
              fi
            else
              resolved="$base_tag"
            fi
          else
            resolved="$requested"
          fi

          prerelease="$INPUT_IS_PRERELEASE"
          case "$resolved" in
            v*-*) prerelease="true" ;;
          esac

          echo "Resolved release tag: $resolved"
          echo "tag_name=$resolved" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build-android:
    needs: resolve-release-tag
    if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Init specific submodules
        run: |
          git submodule update --init packages/anymex_extension_bridge
          git submodule update --init packages/commentum_client

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.7
          cache: true

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Create env file
        run: |
          cat > keys.json <<EOF
          {
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANILIST_CLIENT_SECRET": "${{ secrets.ANILIST_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "COMMENTUM_API_URL": "${{ secrets.COMMENTUM_API_URL }}",
            "RELEASE_REPO": "roshancodespace/ShonenX"
          }
          EOF

      - name: Get Dependencies
        run: find . -name "pubspec.lock" -type f -delete && flutter pub upgrade

      - name: Build APKs
        run: flutter build apk --release --split-per-abi --dart-define-from-file=keys.json

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk

  build-linux:
    needs: resolve-release-tag
    if: github.event_name == 'push' || github.event.inputs.build_linux == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev libmpv-dev libasound2-dev webkit2gtk-4.1

      - uses: actions/checkout@v4

      - name: Init specific submodules
        run: |
          git submodule update --init packages/anymex_extension_bridge
          git submodule update --init packages/commentum_client

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.7
          cache: true

      - name: Create env file
        run: |
          cat > keys.json <<EOF
          {
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANILIST_CLIENT_SECRET": "${{ secrets.ANILIST_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "COMMENTUM_API_URL": "${{ secrets.COMMENTUM_API_URL }}",
            "RELEASE_REPO": "roshancodespace/ShonenX"
          }
          EOF

      - name: Enable Linux config
        run: flutter config --enable-linux-desktop
      
      - name: Get Dependencies
        run: find . -name "pubspec.lock" -type f -delete && flutter pub upgrade

      - name: Build Linux app
        run: flutter build linux --release --dart-define-from-file=keys.json
      
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle

  build-windows:
    needs: resolve-release-tag
    if: github.event_name == 'push' || github.event.inputs.build_windows == 'true'
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Init specific submodules
        run: |
          git submodule update --init packages/anymex_extension_bridge
          git submodule update --init packages/commentum_client

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.7
          cache: true

      - name: Enable Windows config
        run: flutter config --enable-windows-desktop

      - name: Create env file
        shell: bash
        run: |
          cat > keys.json <<EOF
          {
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANILIST_CLIENT_SECRET": "${{ secrets.ANILIST_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "COMMENTUM_API_URL": "${{ secrets.COMMENTUM_API_URL }}",
            "RELEASE_REPO": "roshancodespace/ShonenX"
          }
          EOF

      - name: Get Dependencies
        run: flutter pub upgrade

      - name: Build Windows app
        shell: bash
        run: |
          flutter build windows --release --dart-define-from-file=keys.json || {
            echo "First build failed (likely due to media_kit libmpv download race condition). Retrying..."
            flutter build windows --release --dart-define-from-file=keys.json
          }

      - name: Build installer (InnoBundle)
        run: dart run inno_bundle --release --no-app

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/windows/x64/installer/Release

  create-release:
    needs: [resolve-release-tag, build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: artifacts/android

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows

      - name: Zip Linux bundle
        run: |
          cd artifacts
          zip -r ShonenX-linux.zip linux

      - name: Generate Release Notes
        id: release_notes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURRENT_TAG: ${{ needs.resolve-release-tag.outputs.tag_name }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$CURRENT_TAG" >/dev/null; then
            PREV_TAG=$(git describe --tags --abbrev=0 "refs/tags/$CURRENT_TAG^" 2>/dev/null || true)
          else
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || true)
          fi

          if [ -n "$PREV_TAG" ]; then
            echo "Comparing $PREV_TAG..HEAD"
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)")
            COMPARE_LINK="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"
          else
            echo "No previous tag found, getting recent commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" -n 30)
            COMPARE_LINK=""
          fi

          echo "Commits to format:"
          echo "$COMMITS"

          NOTES=""
          if [ -n "$GEMINI_API_KEY" ]; then
            PROMPT="You are a professional software release manager. Format the following git commit messages into minimal, clean, professional Markdown release notes for version ${CURRENT_TAG}.

          Rules:
          1. Keep it minimal and professional.
          2. Group related changes logically (e.g., Features, Bug Fixes, Improvements, Refactoring) if applicable, or just use clean bullet points.
          3. DO NOT deviate significantly from what the commit messages say. Do not invent features or exaggerate changes.
          4. Avoid using too many emojis (at most 1-2 subtle section icons, or none at all).
          5. Return ONLY the Markdown text for the release notes without any introductory or concluding remarks from the AI.

          Commits:
          ${COMMITS}"

            PAYLOAD=$(jq -n --arg prompt "$PROMPT" '{contents: [{parts: [{"text": $prompt}]}]}')

            call_gemini() {
              local model="$1"
              curl -s -X POST \
                "https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD"
            }

            for MODEL in "gemini-2.5-flash" "gemini-3.5-flash" "gemini-2.5-pro" "gemini-1.5-flash"; do
              echo "Trying Gemini model: $MODEL..."
              RESPONSE=$(call_gemini "$MODEL")
              NOTES=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
              if [ -n "$NOTES" ]; then
                echo "Successfully generated release notes using $MODEL"
                break
              else
                echo "Model $MODEL failed or returned empty. Response: $RESPONSE"
              fi
            done
          else
            echo "GEMINI_API_KEY secret is not set. Falling back to default commit list."
          fi

          if [ -z "$NOTES" ]; then
            echo "Using fallback commit list for release notes."
            NOTES="## What's Changed

          $COMMITS"
          fi

          if [ -n "$COMPARE_LINK" ]; then
            NOTES="$NOTES

          ---
          **Full Changelog**: $COMPARE_LINK"
          fi

          echo "$NOTES" > release_notes.md
          echo "Generated release_notes.md:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release-tag.outputs.tag_name }}
          name: ${{ needs.resolve-release-tag.outputs.tag_name }}
          prerelease: ${{ needs.resolve-release-tag.outputs.is_prerelease == 'true' }}
          body_path: release_notes.md
          files: |
            artifacts/android/*.apk
            artifacts/ShonenX-linux.zip
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: [resolve-release-tag, build-android, build-linux, build-windows]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && (github.event_name == 'push' || github.event.inputs.notify_discord == 'true')
    uses: ./.github/workflows/Notify.yml
    with:
      notify_everyone: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.notify_everyone == 'true' || true }}
      include_logs: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.include_logs == 'true' || true }}
      is_prerelease: ${{ needs.resolve-release-tag.outputs.is_prerelease == 'true' }}
      tag_name: ${{ needs.resolve-release-tag.outputs.tag_name }}
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
